<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Rifa - Pagina Oficial</title>
    <style>
        :root {
            --primary: #ff4e50;
            --secondary: #f9d423;
            --dark: #1e1e24;
            --light: #fff;
            --success: #2ecc71;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Permite que empiece arriba para que haya espacio para deslizar */
            padding: 15px; /* Margen ideal para que no pegue a los bordes físicos del celular */
            color: var(--dark);
            overflow-y: auto; /* Garantiza que se pueda deslizar hacia abajo en cualquier celular */
        }

        /* Contenedor principal ultra-adaptativo */
        .container {
            background: rgba(255, 255, 255, 0.98);
            max-width: 500px; /* Tamaño óptimo para verse estilizado tanto en PC como en móviles */
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            padding: 20px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        header h1 {
            font-size: 1.8rem;
            color: #d32f2f;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        header p {
            color: #555;
            font-size: 0.95rem;
            line-height: 1.3;
        }

        /* Sección de números elegidos */
        .preview-section {
            background: #f8f9fa;
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .preview-title {
            font-weight: 600;
            margin-bottom: 12px;
            color: #334155;
            font-size: 0.95rem;
        }

        .balls-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            min-height: 45px;
            align-items: center;
            flex-wrap: wrap; /* Si la pantalla es muy angosta, las esferas bajan con orden */
        }

        .ball {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, #e2e8f0);
            border: 2px solid #cbd5e1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
        }

        .ball.user-selected {
            background: radial-gradient(circle at 30% 30%, #ff7675, #d63031);
            color: white;
            border-color: #c0392b;
        }

        .ball.winner-selected {
            background: radial-gradient(circle at 30% 30%, #ffeaa7, #fdcb6e);
            color: #2d3436;
            border-color: #e1b12c;
        }

        /* Tablero de Botones */
        .board-container {
            margin-bottom: 20px;
        }

        .board-instruction {
            text-align: center;
            margin-bottom: 12px;
            font-weight: 600;
            color: #475569;
            font-size: 0.95rem;
        }

        /* Teclado numérico adaptable */
        .grid-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr); /* 6 columnas en celulares por defecto */
            gap: 6px;
        }

        .btn-number {
            width: 100%;
            aspect-ratio: 1; /* Hace que los botones del tablero sean perfectamente cuadrados */
            border: 1px solid #cbd5e1;
            background: white;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #334155;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent; /* Quita el destello azul molesto en móviles */
        }

        .btn-number.active {
            background: var(--primary);
            color: white;
            border-color: #d32f2f;
            box-shadow: 0 3px 8px rgba(255, 78, 80, 0.3);
        }

        /* Área de acción */
        .actions {
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-main {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 12px rgba(46, 204, 113, 0.3);
            transition: all 0.2s;
            width: 100%; /* Ocupa todo el ancho en móviles para presionar fácilmente */
        }

        .btn-main:disabled {
            background: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Resultados */
        .results-section {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 15px;
            display: none;
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1e293b;
            text-align: center;
        }

        .prize-box {
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            background: white;
            border-radius: 10px;
            border-left: 5px solid var(--success);
            font-size: 1rem;
            line-height: 1.4;
        }

        /* =============================================================
           MEDIA QUERIES: Adaptación perfecta según tamaño de pantalla
           ============================================================= */

        /* Para pantallas medianas y grandes (Tablets, Laptops y Computadoras) */
        @media (min-width: 481px) {
            body {
                align-items: center; /* Centrado vertical en pantallas grandes */
                padding: 20px;
            }
            .container {
                max-width: 600px;
                padding: 30px;
            }
            header h1 {
                font-size: 2.2rem;
            }
            .grid-board {
                grid-template-columns: repeat(10, 1fr); /* 10 columnas en pantallas grandes */
                gap: 8px;
            }
            .btn-number {
                aspect-ratio: auto;
                padding: 10px 0;
            }
            .btn-main {
                width: auto;
                padding: 14px 40px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎟️ Gran Rifa</h1>
        <p>Selecciona tus 6 números de la suerte y apoya nuestra noble causa</p>
    </header>

    <div class="preview-section">
        <div class="preview-title">Tus Números Seleccionados</div>
        <div id="user-balls" class="balls-container">
            <div class="ball">-</div>
            <div class="ball">-</div>
            <div class="ball">-</div>
            <div class="ball">-</div>
            <div class="ball">-</div>
            <div class="ball">-</div>
        </div>
    </div>

    <div class="board-container">
        <div class="board-instruction">Haz clic sobre 6 números diferentes (1 al 50):</div>
        <div id="board" class="grid-board"></div>
    </div>

    <div class="actions">
        <button id="btn-draw" class="btn-main" disabled>¡Lanzar Jugada Ganadora! 🎲</button>
    </div>

    <div id="results" class="results-section">
        <div class="result-title">🎯 Resultados del Sorteo</div>
        <div style="text-align: center; margin-bottom: 10px; font-weight: 500; font-size: 0.95rem;">Números Ganadores:</div>
        <div id="winner-balls" class="balls-container"></div>
        
        <div id="prize-result" class="prize-box"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
